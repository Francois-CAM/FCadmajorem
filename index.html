<!DOCTYPE html>
<html>
<head><title>Accès Site</title></head>
<body>
  <div id="login">
    <input type="password" id="pwd" placeholder="Mot de passe">
    <button onclick="check()">Connexion</button>
    <div id="alert" style="display:none; color:red;">Mot de passe incorrect</div>
  </div>
  <div id="content" style="display:none;">
    <h1>Serveur disponible</h1>
    <div id="url"></div>
  </div>
  <script>
    const CORRECT_PWD = '1234';
    const WORKER_URL = 'https://monworker.exemple.workers.dev';  // Remplacez par votre Worker URL

    function check() {
      const input = document.getElementById('pwd').value;
      if (input === CORRECT_PWD) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        fetch(WORKER_URL)
          .then(res => res.text())
          .then(text => document.getElementById('url').innerText = text)
          .catch(() => document.getElementById('url').innerText = 'Erreur récupération URL');
      } else {
        document.getElementById('alert').style.display = 'block';
      }
    }
  </script>
</body>
</html>
