<!DOCTYPE html>
<html>
<head><title>Accès Site</title></head>
<body>
  <div id="login">
    <input type="password" id="pwd" placeholder="Mot de passe">
    <button onclick="check()">Connexion</button>
    <div id="alert" style="display:none; color:red;">Mot de passe incorrect</div>
  </div>
  <div id="content" style="display:none;">
    <h1>Serveur disponible</h1>
    <div id="url"></div>
  </div>
<script>
  const CORRECT_PWD = '1234';
  const WORKER_URL = 'https://VOTRE-WORKER.exemple.workers.dev';  // Mettez vraie URL Worker

  function check() {
    const input = document.getElementById('pwd').value;
    if (input === CORRECT_PWD) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      
      // Fetch ici : après connexion réussie
      fetch(WORKER_URL, { mode: 'cors' })
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then(text => {
          document.getElementById('url').innerHTML = `<a href="${text.trim()}" target="_blank">Accéder au site</a>`;
        })
        .catch(err => {
          document.getElementById('url').innerHTML = 'Erreur récupération URL: ' + err.message;
        });
    } else {
      document.getElementById('alert').style.display = 'block';
      setTimeout(() => document.getElementById('alert').style.display = 'none', 3000);  // Cache alerte
    }
  }
</script>
</body>
</html>
