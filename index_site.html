<!DOCTYPE html>
<html>
<head>
  <title>Accès sécurisé</title>
</head>
<body>

<div id="login">
  <h3>Mot de passe :</h3>
  <input type="password" id="pwd">
  <button onclick="check()">Entrer</button>
</div>

<div id="content" style="display:none;">
  <pre id="output"></pre>
</div>

<script id="js1">
const contenu = document.getElementById("contenu");

contenu.innerText = "Connexion...";

fetch("https://proud-resonance-eaae.francoisjmclermont.workers.dev")
  .then(response => {
    if (!response.ok) {
      throw new Error("Erreur HTTP");
    }
    return response.text();
  })
  .then(url => {
    return fetch(url + "/data");
  })
  .then(response => {
    if (!response.ok) {
      throw new Error("Serveur inaccessible");
    }
    return response.text();
  })
  .then(data => {
    contenu.innerText = data;
  })
  .catch(error => {
    console.error(error);
    contenu.innerText = "Désolé, le serveur est hors ligne.";
  });
</script>

</body>
</html>
